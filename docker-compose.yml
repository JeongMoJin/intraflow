services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: intraflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${INTRAFLOW_SQL_PASSWORD:?Set INTRAFLOW_SQL_PASSWORD in .env or environment}"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - intraflow-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  intraflow-sql-data:
